<!doctype html>
<!-- GitHub Pages serves this for unknown paths. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
  // Language shortcut links: /tr, /es, /ja … -> home in that language.
  // (GitHub Pages has no real file at those paths, so they land here first.)
  (function () {
    var codes = { en: 1, es: 1, fr: 1, de: 1, it: 1, tr: 1, ru: 1, zh: 1, ja: 1 };
    var seg = location.pathname.replace(/^\/+/, "").split("/")[0].toLowerCase();
    if (codes[seg]) location.replace((seg === "en" ? "/" : "/?lang=" + seg) + location.hash);
  })();
</script>
<title>Page not found · MaybeLater</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#faf9f6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap">
<link rel="stylesheet" href="assets/css/styles.css">

<main id="main">
  <section class="section" style="min-height:70vh;display:grid;place-items:center;text-align:center">
    <div class="container">
      <img src="assets/img/logo.svg" alt="MaybeLater" width="56" height="56" style="margin:0 auto 1.5rem">
      <h1 style="font-size:clamp(2rem,7vw,3rem)">Page not found</h1>
      <p class="muted" style="max-width:32rem;margin:0 auto 2rem">We couldn't find what you were looking for. It may have moved, or the link might be off.</p>
      <a class="btn btn--primary btn--lg" href="./">Back to home</a>
    </div>
  </section>
</main>
